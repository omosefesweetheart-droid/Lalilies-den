<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
color:#FFD700;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#FFD700;
color:black;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<h1>✏️ Edit Profile</h1>

<input type="text" id="display_name" placeholder="Display Name">

<input type="text" id="country" placeholder="Country">

<input type="text" id="favorite_song" placeholder="Favorite Lisa Song">

<input type="file">

<button id="saveBtn">
Save Profile
</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://nsyhconcqsqueydhhheu.supabase.co";

const supabaseKey = "sb_publishable_fFIEmCXZdk20izLCpWV7bg_ijCj0sHQ";

const { createClient } = supabase;

const client = createClient(
supabaseUrl,
supabaseKey
);

document.getElementById("saveBtn")
.addEventListener("click", async () => {

const {
data: { user }
} = await client.auth.getUser();

const display_name =
document.getElementById("display_name").value;

const country =
document.getElementById("country").value;

const favorite_song =
document.getElementById("favorite_song").value;

const { error } = await client
.from("Profiles")
.upsert({
user_id: user.id,
display_name,
country,
favorite_song
});

if(error){
alert("ERROR: " + error.message);
return;
}

alert("Profile Saved Successfully!");

window.location.href = "Profile.html";

});

</script>

</body>
</html>
