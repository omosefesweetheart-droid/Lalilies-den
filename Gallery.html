<!DOCTYPE html>
<html>
<head>
<title>Lisa Photo Gallery</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    color:#ffd700;
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.photo{
    background:#111;
    border:1px solid #ffd700;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.photo img{
    width:100%;
    border-radius:10px;
}

.photo p{
    color:#ffd700;
    font-weight:bold;
}

button{
    background:#ffd700;
    color:black;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>📸 Lisa Photo Gallery</h1>

<div class="gallery">
    
<img src="https://via.placeholder.com/600x400" alt="Photo 1">
<img src="https://via.placeholder.com/600x400" alt="Photo 2">
<img src="https://via.placeholder.com/600x400" alt="Photo 3">
<img src="https://via.placeholder.com/600x400" alt="Photo 4">
    
</div>

<a href="index.html">
<button>⬅ Back to Home</button>
</a>

</body>
</html>
