<!DOCTYPE html>
<html>
<head>
<title>Lisa Photo Gallery</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    color:#ffd700;
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.photo{
    background:#111;
    border:1px solid #ffd700;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.photo img{
    width:100%;
    border-radius:10px;
}

.photo p{
    color:#ffd700;
    font-weight:bold;
}

button{
    background:#ffd700;
    color:black;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>📸 Lisa Photo Gallery</h1>

<div class="gallery">

<div class="photo">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600" alt="Photo 1">
<p>Performance Photos</p>
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=600" alt="Photo 2">
<p>Magazine Shoots</p>
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600" alt="Photo 3">
<p>Fan Favorites</p>
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600" alt="Photo 4">
<p>Event Appearances</p>
</div>

</div>

<a href="index.html">
<button>⬅ Back to Home</button>
</a>

</body>
</html>
