<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
"https://nsyhconcqsqueydhhheu.supabase.co";

const supabaseKey =
"sb_publishable_fFIEmCXZdk20izLCpWV7bg_ijCj0sHQ";

const { createClient } = supabase;
const client = createClient(supabaseUrl, supabaseKey);

async function checkVIP() {

  const {
    data: { user }
  } = await client.auth.getUser();

  if (!user) return;

  const { data } = await client
    .from("vip_members")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if(data){
    document.getElementById("vip_status").textContent =
      "💎 Active";
  }
}

checkVIP();

document.getElementById("vipBtn").onclick = async function(){

alert("VIP button clicked");
  alert("Getting user...");

const {
  data: { user }
} = await client.auth.getUser();

alert("User check finished");

  if(!user){
    alert("Please login first");
    return;
  }

alert("User email: " + (user ? user.email : "NO USER"));
  
  alert("PaystackPop type: " + typeof PaystackPop);

  alert("Before setup");

alert("Before Paystack setup");

const handler = PaystackPop.setup({
  ...
});

alert("After Paystack setup");

handler.openIframe();

alert("After openIframe");
 
key: "pk_live_42ad7a6d90ab234d75c876e0e12e8d44e583e5d5",
 
  email: user.email,
  amount: 10000,

  callback: async function(response){

  const expiryDate = new Date();
  expiryDate.setDate(expiryDate.getDate() + 30);

  const { error } = await client
    .from("vip_members")
    .insert([{
      user_id: user.id,
      payment_reference: response.reference,
      status: "active",
      plan: "monthly",
      expires_at: expiryDate.toISOString()
    }]);
