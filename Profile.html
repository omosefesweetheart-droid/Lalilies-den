<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
}

.header{
text-align:center;
padding:25px;
border-bottom:1px solid #333;
}

.header h1{
color:#FFD700;
}

.profile-pic{
width:120px;
height:120px;
border-radius:50%;
background:#222;
margin:20px auto;
display:block;
object-fit:cover;
border:3px solid #FFD700;
}

.card{
background:#111;
margin:15px;
padding:20px;
border-radius:15px;
border:1px solid #333;
}

.title{
color:#FFD700;
font-weight:bold;
margin-bottom:8px;
}

.menu-btn{
display:block;
background:#FFD700;
color:black;
text-decoration:none;
text-align:center;
padding:15px;
margin:15px;
border-radius:10px;
font-weight:bold;
}

.vip{
color:#FFD700;
}
</style>
</head>

<body>

<div class="header">
<h1>👤 My Profile</h1>
</div>

<img
id="avatar"
class="profile-pic"
src="https://via.placeholder.com/120"
alt="Profile Picture">

<div class="card">
<div class="title">Display Name</div>
<div id="display_name">Loading...</div>
</div>

<div class="card">
<div class="title">Country</div>
<div id="country">Loading...</div>
</div>

<div class="card">
<div class="title">Favorite Lisa Song</div>
<div id="favorite_song">Loading...</div>
</div>

<a href="VIP.html" style="text-decoration:none;color:white;">

<div class="card">

<div class="title vip">
💎 VIP Status
</div>

<div id="vip_status">
Not Activated
</div>

</div>

</a>

<a href="EditProfile.html" class="menu-btn">
⚙️ Edit Profile
</a>

<a href="Dashboard.html" class="menu-btn">
← Back to Dashboard
</a>

<a href="index.html" class="menu-btn">
🚪 Logout
</a>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
"https://nsyhconcqsqueydhhheu.supabase.co";

const supabaseKey =
"sb_publishable_fFIEmCXZdk20izLCpWV7bg_ijCj0sHQ";

const { createClient } = supabase;

const client =
createClient(supabaseUrl, supabaseKey);

async function loadProfile() {

const {
data: { user }
} = await client.auth.getUser();

if (!user) return;

const { data, error } = await client
.from("Profiles")
.select("*")
.eq("user_id", user.id)
.maybeSingle();

if(error){
alert(error.message);
return;
}

document.getElementById("display_name").textContent =
data.display_name || "Not Set Yet";

document.getElementById("country").textContent =
data.country || "Not Set Yet";

document.getElementById("favorite_song").textContent =
data.favorite_song || "Not Set Yet";

if(data.avatar_url){
document.getElementById("avatar").src =
data.avatar_url;
}

}

loadProfile();

</script>

</body>
</html>
