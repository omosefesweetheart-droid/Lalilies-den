<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lalilies Den Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
padding-bottom:80px;
}

.header{
background:#111;
padding:20px;
text-align:center;
border-bottom:1px solid #333;
}

.header h1{
color:#FFD700;
font-size:28px;
}

.welcome{
padding:25px;
text-align:center;
}

.welcome h2{
color:#FFD700;
margin-bottom:10px;
}

.announcement{
margin:20px;
background:#111;
padding:20px;
border-radius:15px;
border:1px solid #333;
}

.announcement h3{
color:#FFD700;
margin-bottom:10px;
}

.logout-btn{
display:block;
margin:20px auto;
padding:12px 25px;
background:#FFD700;
color:black;
border:none;
border-radius:10px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
border-top:1px solid #333;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.bottom-nav a{
color:#FFD700;
text-decoration:none;
font-size:14px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h1>👑 Lalilies Den</h1>
</div>

<div class="welcome">
<h2 id="welcomeText">Welcome Back 🌸</h2>
</div>

<div class="announcement">
<h3>📢 Latest Announcement</h3>

<p>
Welcome to Lalilies Den.

Complete your profile, connect with Lilies around the world,
join community activities, and stay updated on the latest
announcements and fan projects.
</p>
</div>

<button class="logout-btn" id="logoutBtn">
Logout
</button>

<div class="bottom-nav">
<a href="Community.html">💬<br>Community</a>
<a href="Media.html">🎵<br>Media</a>
<a href="Streams.html">📈<br>Streams</a>
<a href="Notifications.html">🔔<br>Notifications</a>
<a href="Profile.html">👤<br>Profile</a>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nsyhconcqsqueydhhheu.supabase.co";
const supabaseKey = "sb_publishable_fFIEmCXZdk20izLCpWV7bg_ijCj0sHQ";

const { createClient } = supabase;
const client = createClient(
supabaseUrl,
supabaseKey
);

async function checkUser(){

const {
data: { user }
} = await client.auth.getUser();

if(!user){
window.location.href = "Login.html";
return;
}

document.getElementById("welcomeText").innerText =
"Welcome Back, " + user.email + " 🌸";
}

checkUser();

document.getElementById("logoutBtn")
.addEventListener("click", async () => {

await client.auth.signOut();

window.location.href = "Login.html";

});
</script>

</body>
</html>
