<!DOCTYPE html>
<html>
<head>
<title>Sign Up - Lalilies Den</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #fff8dc;
  text-align: center;
  padding: 50px;
}

.card{
  background: white;
  max-width: 350px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
}

input{
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button{
  background: #ffcc00;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>💛 Sign Up 💛</h1>

  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <br><br>

  <button onclick="alert('TEST WORKING')">Create Account</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nsyhconcqsqueydhhheu.supabase.co";

const supabaseKey = "sb_publishable_fFIEmCXZdk20izLCpWV7bg_ijCj0sHQ";

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function signUp() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("ERROR: " + error.message);
  } else {
    alert("SUCCESS! Account created.");
  }
}
</script>

</body>
</html>
