<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:400px;
}

h1{
    text-align:center;
    color:#FFD700;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#FFD700;
    color:black;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
}

p{
    text-align:center;
}

a{
    color:#FFD700;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<input type="text" placeholder="Username">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button onclick="location.href='AccessCode.html'">
Create Account
</button>

<p>
Already have an account?
<a href="Login.html">Login</a>
</p>

</div>

</html>
