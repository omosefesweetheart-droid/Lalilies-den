<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Chat</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

.header a{
color:#FFD700;
text-decoration:none;
font-weight:bold;
}

.title{
color:#FFD700;
font-size:20px;
font-weight:bold;
}

.actions{
font-size:24px;
}

.chat-area{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
background:#111;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #333;
}

.name{
color:#FFD700;
font-weight:bold;
margin-bottom:5px;
}

.input-area{
background:#111;
padding:15px;
border-top:1px solid #333;
}

.tools{
font-size:24px;
margin-bottom:10px;
display:flex;
gap:15px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
color:black;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<a href="Community.html">← Back</a>

<div class="title">
💬 Global Chat
</div>

<div class="actions">
📞 🎥
</div>
</div>

<div class="chat-area" id="chatArea">

</div>

<div class="input-area">

<div class="tools">
😀 📷 🎤
</div>

<input
id="messageInput"
type="text"
placeholder="Type your message..."
>

<button id="sendBtn">
Send
</button>
  
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="chat.js?v=2"></script>
  
</body>
  </html>
